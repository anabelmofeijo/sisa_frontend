<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | SISA</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="login-page" id="login-page">
  <main class="login-center">
    <section class="login-card">
      <div class="login-header">
        <div class="login-logo-row">
          <img class="login-logo-img" src="assets/sisa-logo.png" alt="SISA" />
        </div>
        <h1>Bem-vindo ao SISA</h1>
        <p>Sistema Inteligente de Sustentabilidade em Ascensores</p>
      </div>

      <form id="login-form" class="login-form" autocomplete="on">
        <label for="login-email">Email</label>
        <div class="field-wrap">
          <span class="field-icon">✉</span>
          <input id="login-email" name="email" type="email" placeholder="seu@email.pt" value="anabelmofeijo@gmail.com" required />
        </div>

        <label for="login-password">Palavra-passe</label>
        <div class="field-wrap">
          <span class="field-icon">⌂</span>
          <input id="login-password" name="password" type="password" placeholder="••••••••" value="admin@admin" required />
          <button id="toggle-password" class="field-toggle" type="button" aria-label="Mostrar palavra-passe">◉</button>
        </div>

        <a href="#" class="forgot-link">Esqueci a palavra-passe</a>

        <button type="submit" class="login-submit">Entrar</button>
      </form>

      <div class="login-footer">
        Não tem conta? <a href="registo.html">Registar</a>
      </div>
    </section>
  </main>

  <script src="js/api.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
